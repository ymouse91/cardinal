<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" href="icon192.png">
  <link rel="apple-touch-icon" href="icon192.png">
<title>Cardinal-henkinen logiikkapeli</title>
<style>
  /* ═══════════════════════════════════════════
     TOKENS
  ═══════════════════════════════════════════ */
  :root{
    --bg:#141416;
    --panel:#202126;
    --panel2:#353840;
    --ink:#f3efe6;
    --muted:#bfc3cb;
    --accent:#f0bf2c;
    --line:#484b53;
    --card:#f5efe5;
    --shadow:0 8px 24px rgba(0,0,0,.28);
    --good:#58d37b;
    --bad:#ef5d5d;
    /* board sizing — overridden per breakpoint */
    --bc:94px;   /* boardCell */
    --bg2:6px;   /* boardGap  */
    --bp:10px;   /* boardPad  */
    --bs:calc(4*var(--bc) + 3*var(--bg2) + 2*var(--bp)); /* boardSize */
  }

  /* ═══════════════════════════════════════════
     BASE
  ═══════════════════════════════════════════ */
  *{box-sizing:border-box}
  html{
    height:100%;
    margin:0;
    background:#101114;
  }
  body{
    min-height:100%;
    margin:0;
    font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    background:linear-gradient(180deg,#1b1c20,#131417 30%,#101114);
    color:var(--ink);
    overflow:hidden;
  }
  h1{
    grid-column:1;
    grid-row:1;
    display:block;
    font-size:22px;
    font-weight:800;
    color:var(--accent);
    margin:0;
    letter-spacing:.04em;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    line-height:1.1;
    align-self:center;
  }
  .sub,.legend,.sectionTitle,.help,.clueHelp,.clueHelpTitle,.clueHelpText{display:none}

  /* ── Wrap ── */
  .wrap{
    width:min(1440px,100%);
    margin:0 auto;
    min-height:100svh;
    padding:
      calc(6px + env(safe-area-inset-top))
      calc(8px + env(safe-area-inset-right))
      calc(6px + env(safe-area-inset-bottom))
      calc(8px + env(safe-area-inset-left));
    display:grid;
    grid-template-columns:minmax(0,1fr) auto;
    grid-template-rows:auto 1fr;
    gap:10px 14px;
    overflow:hidden;
  }

  /* ── Topbar ── */
  .topbar{
    grid-column:2;
    grid-row:1;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
    justify-content:flex-end;
    min-height:0;
    align-self:start;
  }
  button,select,label{font:inherit}
  button,select{
    background:#2b2d33;color:var(--ink);border:1px solid #4a4d56;border-radius:12px;
    padding:8px 12px;font-size:14px;cursor:pointer;min-height:40px;
  }
  label{display:flex;align-items:center;gap:6px;color:transparent;font-size:0}
  label select{color:var(--ink);font-size:14px}
  button:hover,select:hover{filter:brightness(1.08)}
  .primary{background:#3d3520;border-color:#a67e14}

  /* ── Layout (desktop: sidebar) ── */
  .layout{
    grid-column:1 / -1;
    grid-row:2;
    display:grid;
    grid-template-columns:max-content minmax(0,1fr);
    gap:14px;
    align-items:start;
    min-height:0;
    overflow:hidden;
  }
  .panel{background:none;border:none;box-shadow:none}
  .boardPanel,.cluePanel{padding:0;min-height:0}

  /* ── Game area ── */
  .boardPanel{width:var(--bs)}
  .gameArea{display:flex;flex-direction:column;gap:8px;align-items:flex-start;width:var(--bs)}
  .boardWrap{display:grid;gap:8px;width:var(--bs)}

  /* ── Board ── */
  .board{
    display:grid;
    grid-template-columns:repeat(4,var(--bc));
    grid-template-rows:repeat(4,var(--bc));
    gap:var(--bg2);
    background:#111216;
    padding:var(--bp);
    border-radius:16px;
    border:2px solid #e8e2d8;
    width:var(--bs);
    height:var(--bs);
  }
  .slot{
    width:var(--bc);height:var(--bc);border-radius:13px;
    background:#0b0c0f;border:1px dashed #575b67;
    display:flex;align-items:center;justify-content:center;
  }
  .slot.filled{border-style:solid;background:#111215}
  .slot.fixed{border-color:#f0bf2c;box-shadow:inset 0 0 0 2px rgba(240,191,44,.35)}
  .card{
    width:var(--bc);height:var(--bc);border-radius:12px;
    background:var(--card);display:flex;align-items:center;justify-content:center;
    box-shadow:0 3px 8px rgba(0,0,0,.2);border:1px solid rgba(0,0,0,.08);
    cursor:pointer;position:relative;
  }
  .card svg{width:calc(var(--bc) - 10px);height:calc(var(--bc) - 10px);overflow:visible}
  .card.selected{outline:none;box-shadow:0 0 0 2px var(--accent)}

  /* ── Status ── */
  .status{
    padding:8px 10px;border-radius:12px;background:#2b2d33;
    min-height:40px;font-size:13px;line-height:1.25;
    max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .ok{color:var(--good);font-weight:700}
  .err{color:var(--bad);font-weight:700}

  /* ── Tray (desktop) ── */
  .tray{
    display:grid;grid-template-columns:repeat(6,1fr);grid-auto-rows:auto;gap:6px;
    background:#2f3138;padding:8px;border-radius:14px;border:1px solid #474a53;
    width:var(--bs);max-width:var(--bs);min-width:var(--bs);
    align-content:start;
  }
  #tray .card,#tray .trayPlaceholder{
    width:100%;aspect-ratio:1/1;height:auto;justify-self:stretch;
    border-radius:9px;min-width:0;
  }
  #tray .card svg{width:86%;height:86%}
  #tray .trayPlaceholder{border:1px dashed #4a4d56;background:rgba(255,255,255,.03)}

  /* ── Clues ── */
  .cluePanel{display:flex;flex-direction:column;gap:12px;overflow:hidden;padding-top:2px}
  .clueGroups{display:grid;grid-template-columns:1fr;gap:18px;min-height:0;align-content:start}
  .clueGroup{min-width:0}
  .groupTitle{
    font-size:13px;font-weight:800;color:#e3d9b4;margin:0 0 10px;
    letter-spacing:.05em;text-transform:uppercase;
    display:flex;align-items:center;gap:7px;
  }
  .axis{
    display:inline-flex;align-items:center;justify-content:center;
    width:20px;height:20px;border-radius:999px;
    background:#15161a;border:1px solid #8e7640;font-size:11px;color:#fff;font-weight:700;
  }
  .clues{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-start}
  #colClues{display:flex;flex-wrap:wrap;gap:12px;overflow:visible;align-items:flex-start}
  #rowClues{display:grid;grid-template-columns:repeat(3,max-content);gap:14px}
  .clue{
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    gap:9px;padding:11px;border-radius:13px;background:#3a3c44;border:1px solid #4b4e57;
    min-width:84px;min-height:102px;cursor:pointer;user-select:none;
    transition:opacity .15s,filter .15s,box-shadow .15s,border-color .15s;
  }
  .clue.dimmed{opacity:.3;filter:saturate(.35)}
  .clue.related{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent)}
  .clue .icons{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:7px;flex:0 0 auto}
  .clue.row{flex-direction:row;align-items:center;min-width:auto;min-height:auto;padding:12px 14px}
  .clue.row .icons{flex-direction:row;gap:6px}
  .clue.col{flex-direction:column;align-items:center}
  .clue.col .icons{flex-direction:column;gap:6px}
  .clue:hover{background:#454851}
  .mini{width:58px;height:58px;border-radius:11px}
  .mini svg{width:50px;height:50px}
  .marker{font-size:27px;color:#f0f0f0;line-height:1;display:flex;align-items:center;justify-content:center;text-align:center}
  .miniGrid{
    display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);
    width:50px;height:50px;gap:2px;padding:4px;border-radius:9px;
    background:#15161a;border:1px solid #53565e;
  }
  .miniGrid .cell{width:100%;height:100%;border-radius:2px;background:#2f3239;border:1px solid #4a4d56}
  .miniGrid .cell.hit{background:#f0bf2c;border-color:#f3d680}
  .muted{color:var(--muted)}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}

  /* ═══════════════════════════════════════════
     BREAKPOINTS — leveä desktop
  ═══════════════════════════════════════════ */
  @media (max-width:1280px){
    :root{--bc:88px}
    .wrap{gap:6px}
    .layout{gap:12px}
    .mini{width:50px;height:50px}
    .mini svg{width:42px;height:42px}
    .miniGrid{width:46px;height:46px}
  }
  @media (max-width:1150px){
    :root{--bc:80px}
    button,select{padding:7px 10px;font-size:13px;min-height:36px}
    .layout{gap:10px}
    .status{font-size:12px;min-height:36px}
    .mini{width:44px;height:44px}
    .mini svg{width:36px;height:36px}
    .miniGrid{width:40px;height:40px;padding:3px}
    .clue{padding:8px;min-width:68px;min-height:82px}
    .clue.row{padding:8px 10px}
    .marker{font-size:20px}
  }

  /* ═══════════════════════════════════════════
     TABLETTI / KAPEA DESKTOP  (≤960px)
     Layout pystysuoraan, tray alla ruudukkoa
  ═══════════════════════════════════════════ */
  @media (max-width:960px){
    body{overflow:auto}
    .wrap{overflow:visible;min-height:auto;grid-template-columns:1fr;grid-template-rows:auto auto 1fr}
    h1{grid-column:1;grid-row:1}
    .topbar{grid-column:1;grid-row:2;justify-content:flex-start}
    .layout{grid-column:1;grid-row:3;grid-template-columns:1fr}
    .boardPanel,.gameArea,.boardWrap{width:100%}
    .board{margin:0 auto}
    .tray{grid-template-columns:repeat(4,1fr);width:var(--bs);max-width:var(--bs);min-width:0;margin:0 auto}
    #rowClues{grid-template-columns:repeat(auto-fit,max-content)}
  }

  /* 481–620px: pienennä ruudukkoa mutta pidä tabletti-layout */
  @media (max-width:620px) and (min-width:481px){
    :root{--bc:66px;--bg2:5px;--bp:9px}
    .mini{width:34px;height:34px}
    .mini svg{width:28px;height:28px}
  }

  /* ═══════════════════════════════════════════
     LANDSCAPE-LUKKO kosketuslaitteella
  ═══════════════════════════════════════════ */
  @media (hover:none) and (pointer:coarse) and (orientation:landscape){
    body{overflow:hidden}
    .wrap{overflow:hidden}
  }

  /* ═══════════════════════════════════════════
     PUHELIN PYSTY  (≤480px)
     Ruudukko vasemmalla + palat oikealla 2×8
     Vihjeet alla, rivivihjeet kolmessa sarakkeessa
  ═══════════════════════════════════════════ */
  @media (max-width:480px){

    :root{
      --page-pad-x:6px;
      --game-gap:6px;
      --tray-w:74px;
      --bc:calc((100vw - (2 * var(--page-pad-x)) - var(--game-gap) - var(--tray-w) - (3 * var(--bg2)) - (2 * var(--bp))) / 4);
      --bg2:4px;
      --bp:6px;
    }

    html{
      width:100%;
      min-width:0;
      min-height:100%;
      background:#101114;
      overflow-x:hidden;
    }
    body{
      width:100%;
      min-width:0;
      min-height:100svh;
      background:linear-gradient(180deg,#1b1c20,#131417 30%,#101114);
      overflow-x:hidden;
      overflow-y:auto;
    }

    .wrap{
      width:100%;
      max-width:100vw;
      min-height:100svh;
      overflow:visible;
      display:grid;
      grid-template-columns:minmax(0,1fr);
      grid-template-rows:auto auto auto;
      gap:5px;
      padding:
        calc(4px + env(safe-area-inset-top))
        calc(var(--page-pad-x) + env(safe-area-inset-right))
        calc(4px + env(safe-area-inset-bottom))
        calc(var(--page-pad-x) + env(safe-area-inset-left));
    }

    h1{
      grid-column:1;
      grid-row:1;
      display:block;
      font-size:14px;
      font-weight:800;
      color:var(--accent);
      margin:0;
      letter-spacing:.03em;
      line-height:1.1;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:100%;
    }

    .topbar{
      grid-column:1;
      grid-row:2;
      display:flex;
      flex-wrap:nowrap;
      justify-content:flex-start;
      gap:3px;
      max-width:100%;
      overflow-x:auto;
      overflow-y:hidden;
      -webkit-overflow-scrolling:touch;
    }

    button,select{
      padding:4px 7px;
      font-size:10px;
      min-height:28px;
      border-radius:7px;
      white-space:nowrap;
      flex-shrink:0;
    }
    label{font-size:0;flex-shrink:0}
    label select{font-size:10px}

    .layout{
      grid-column:1;
      grid-row:3;
      display:flex;
      flex-direction:column;
      gap:6px;
      width:100%;
      max-width:100%;
      min-width:0;
      overflow:visible;
    }

    .boardPanel{
      width:100%;
      max-width:100%;
      min-width:0;
    }

    .gameArea{
      display:grid;
      grid-template-columns:minmax(0,var(--bs)) var(--tray-w);
      gap:var(--game-gap);
      align-items:start;
      width:100%;
      max-width:100%;
      min-width:0;
      overflow:hidden;
    }

    .boardWrap{
      display:flex;
      flex-direction:column;
      gap:5px;
      width:var(--bs);
      max-width:var(--bs);
      min-width:0;
    }

    .board{
      width:var(--bs);
      height:var(--bs);
      margin:0;
      border-radius:10px;
    }

    .slot{border-radius:9px;min-width:0}
    .card{border-radius:9px;min-width:0}
    .card svg{
      width:calc(var(--bc) - 6px);
      height:calc(var(--bc) - 6px);
    }

    .status{
      font-size:11px;
      min-height:28px;
      padding:5px 8px;
      border-radius:8px;
      white-space:normal;
      max-width:100%;
    }

    .tray{
      width:var(--tray-w);
      min-width:var(--tray-w);
      max-width:var(--tray-w);
      display:grid;
      grid-template-columns:repeat(2,1fr);
      grid-template-rows:repeat(8,1fr);
      gap:3px;
      padding:4px;
      border-radius:10px;
      align-self:start;
      margin:0;
    }

    #tray .card,
    #tray .trayPlaceholder{
      width:100%;
      aspect-ratio:1/1;
      height:auto;
      border-radius:5px;
      min-width:0;
    }
    #tray .card svg{width:75%;height:75%}

    .cluePanel{
      width:100%;
      max-width:100%;
      min-width:0;
      overflow:visible;
      padding-top:0;
    }

    .clueGroups{
      display:flex;
      flex-direction:column;
      gap:8px;
      width:100%;
      max-width:100%;
      min-width:0;
    }

    .groupTitle{
      font-size:11px;
      margin:0 0 4px;
    }

    .mini{width:24px;height:24px;border-radius:6px}
    .mini svg{width:20px;height:20px}
    .miniGrid{width:22px;height:22px;padding:2px;gap:1px}
    .marker{font-size:11px;line-height:1}

    #colClues{
      display:flex;
      flex-direction:row;
      flex-wrap:nowrap;
      overflow-x:auto;
      overflow-y:hidden;
      gap:4px;
      padding-bottom:2px;
      max-width:100%;
      -webkit-overflow-scrolling:touch;
    }

    .clue.col{
      flex:0 0 auto;
      min-width:36px;
      min-height:auto;
      padding:4px;
      border-radius:7px;
      gap:3px;
    }
    .clue.col .icons{gap:3px}

    #rowClues{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:4px;
      width:100%;
      max-width:100%;
      min-width:0;
    }

    .clue.row{
      flex-direction:row;
      min-width:0;
      min-height:auto;
      padding:4px 5px;
      border-radius:7px;
      gap:3px;
      align-items:center;
    }
    .clue.row .icons{
      flex-direction:row;
      gap:2px;
      flex-wrap:nowrap;
      min-width:0;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Cardinal-logiikkapeli 2.0</h1>

  <div class="topbar">
    <button class="primary" id="newBtn">Uusi</button>
    <label>Vaikeus:
      <select id="difficulty">
        <option value="minimal">Minimi</option>
        <option value="plus2bird" selected>Punainen lintu</option>
      </select>
    </label>
    <button id="checkBtn">Tarkista</button>
    <button id="showBtn">Ratkaisu</button>
    <button id="resetBtn">Tyhjää</button>
    
  </div>

  <div class="layout">
    <div class="panel boardPanel">
      <div class="gameArea">
        <div class="boardWrap">
          <div id="board" class="board"></div>
          <div id="status" class="status">Valitse <span class="ok">Uusi</span>.</div>
        </div>
        <div id="tray" class="tray"></div>
      </div>
    </div>

    <div class="panel cluePanel">
            <div class="clueGroups">
        <div class="clueGroup">
          <div class="groupTitle"><span class="axis">S</span> Sarakkeet</div>
          <div id="colClues" class="clues colClues"></div>
        </div>
        <div class="clueGroup">
          <div class="groupTitle"><span class="axis">R</span> Rivit</div>
          <div id="rowClues" class="clues rowClues"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const CARD_DEFS = [
  {id:'sunDot', name:'Aurinkopiste', draw: svg => {
    circle(svg,42,42,21,'#f1642a');
  }},
  {id:'greenSquare', name:'Vihreä neliö', draw: svg => {
    rect(svg,22,22,40,40,'#8ad26e',0);
  }},
  {id:'blueTri', name:'Sininen kolmio', draw: svg => {
    poly(svg,[[42,12],[68,64],[16,64]], '#39a7ea');
  }},
  {id:'yellowSquare', name:'Keltainen neliö', draw: svg => {
    rect(svg,22,22,40,40,'#f3c035',0);
  }},
  {id:'pinkDiamondStripe', name:'Vinoneliö raidalla', draw: svg => {
    poly(svg,[[42,10],[68,36],[42,62],[16,36]], '#e553a9');
    poly(svg,[[20,58],[26,64],[64,26],[58,20]], '#f3cc3e');
    poly(svg,[[12,50],[18,56],[56,18],[50,12]], '#f3cc3e');
    rect(svg,10,64,64,8,'#38b4df',0);
    rect(svg,10,54,64,6,'#8b42db',0);
  }},
{id:'pinkBarTeeth', name:'Piikkipalkki', draw: svg => {
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('transform','translate(0,14)'); // oikealle 4, alas 8

  rect(g,26,10,32,16,'#c637b7',4);
  rect(g,20,30,44,14,'#f06bb4',0);
  for(let i=0;i<5;i++) poly(g,[[18+i*10,44],[23+i*10,52],[28+i*10,44]], '#222');
  line(g,18,10,66,10,'#e3b422',8,'round');
  circle(g,24,10,3,'#fff');
  circle(g,60,10,3,'#fff');

  svg.appendChild(g);
}},
{id:'gridLime', name:'Neliö ja ympyrä', draw: svg => {
  rect(svg,18,18,48,48,'#f06bb4',4);
  circle(svg,42,42,13,'#f5efe5');
  circle(svg,42,42,7,'#f0bf2c');
}},
  {id:'ringHex', name:'Rengas ja kuusio', draw: svg => {
    circle(svg,42,22,16,'none','#74d83f',7);
    circle(svg,42,22,9,'#f09b35');
    poly(svg,[[42,44],[62,56],[62,68],[42,80],[22,68],[22,56]], 'none','#8acb46',6);
  }},
  {id:'emeraldV', name:'Smaragdi-V', draw: svg => {
    poly(svg,[[18,18],[42,68],[66,18]], '#0d3e4f');
    poly(svg,[[26,22],[42,54],[58,22]], '#f5d53f');
    circle(svg,42,38,4,'#f5d53f');
  }},
{id:'birdRed', name:'Punainen lintu', draw: svg => {
  poly(svg,[[18,56],[44,22],[72,40],[52,64],[26,64]], '#e33d2e');
  poly(svg,[[26,44],[50,36],[48,52]], '#111');
  circle(svg,38,44,3.5,'#f0c43a');
  poly(svg,[[6,54],[26,44],[26,64]], '#f29b20');
}},
  {id:'powerDot', name:'Virtapiste', draw: svg => {
    circle(svg,42,42,20,'#67d65e');
    line(svg,42,18,42,42,'#ff5757',5,'round');
    circle(svg,42,42,4,'#ffcf31');
  }},
  {id:'purpleMountain', name:'Vuori', draw: svg => {
    poly(svg,[[16,58],[42,14],[68,58]], '#d89d45');
    poly(svg,[[26,58],[42,30],[58,58]], '#a966d7');
  }},

const POSITIONS = Array.from({length:16}, (_,i)=>({idx:i,row:Math.floor(i/4),col:i%4}));
const ALL_POS_MASK = 0xFFFF;
let REL = null;
let currentPuzzle = null;
let selectedCardId = null;
let boardState = Array(16).fill(null);
let trayOrder = [];
let fixedPositions = new Set();

function initRelations(){
  const adjRow = Array(16).fill(0), adjCol = Array(16).fill(0), left2 = Array(16).fill(0), right2 = Array(16).fill(0), up2 = Array(16).fill(0), down2 = Array(16).fill(0),
        oppositeRow = Array(16).fill(0), oppositeCol = Array(16).fill(0),
        betweenRowMid = Array(16).fill(0), betweenColMid = Array(16).fill(0);
  const betweenRowAC = Array.from({length:16},()=>Array(16).fill(false));
  const betweenColAC = Array.from({length:16},()=>Array(16).fill(false));
  for(const p of POSITIONS){
    for(const q of POSITIONS){
      if(p.row===q.row && q.col===p.col+1) adjRow[p.idx] |= (1<<q.idx);
      if(p.col===q.col && q.row===p.row+1) adjCol[p.idx] |= (1<<q.idx);
      if(p.row===q.row && q.col===p.col+2) right2[p.idx] |= (1<<q.idx);
      if(p.row===q.row && q.col===p.col-2) left2[p.idx] |= (1<<q.idx);
      if(p.col===q.col && q.row===p.row+2) down2[p.idx] |= (1<<q.idx);
      if(p.col===q.col && q.row===p.row-2) up2[p.idx] |= (1<<q.idx);
      if(p.row===q.row && ((p.col===0&&q.col===3)||(p.col===3&&q.col===0))) oppositeRow[p.idx] |= (1<<q.idx);
      if(p.col===q.col && ((p.row===0&&q.row===3)||(p.row===3&&q.row===0))) oppositeCol[p.idx] |= (1<<q.idx);
    }
  }
  for(const a of POSITIONS){
    for(const b of POSITIONS){
      for(const c of POSITIONS){
        const sameRow = a.row===b.row && b.row===c.row;
        const sameCol = a.col===b.col && b.col===c.col;
        if(sameRow){
          const cols=[a.col,b.col,c.col].sort((x,y)=>x-y);
          if(cols[0]+1===cols[1] && cols[1]+1===cols[2] && b.col===cols[1]){
            betweenRowMid[b.idx] |= (1<<a.idx) | (1<<c.idx);
            betweenRowAC[a.idx][c.idx]=true;
          }
        }
        if(sameCol){
          const rows=[a.row,b.row,c.row].sort((x,y)=>x-y);
          if(rows[0]+1===rows[1] && rows[1]+1===rows[2] && b.row===rows[1]){
            betweenColMid[b.idx] |= (1<<a.idx) | (1<<c.idx);
            betweenColAC[a.idx][c.idx]=true;
          }
        }
      }
    }
  }
  REL = {adjRow,adjCol,left2,right2,up2,down2,oppositeRow,oppositeCol,betweenRowAC,betweenColAC};
}

function circle(svg,cx,cy,r,fill,stroke=null,sw=0){ const el = document.createElementNS('http://www.w3.org/2000/svg','circle'); el.setAttribute('cx',cx);el.setAttribute('cy',cy);el.setAttribute('r',r);el.setAttribute('fill',fill); if(stroke){el.setAttribute('stroke',stroke);el.setAttribute('stroke-width',sw);} svg.appendChild(el); return el; }
function rect(svg,x,y,w,h,fill,rx=0,stroke=null,sw=0){ const el=document.createElementNS('http://www.w3.org/2000/svg','rect'); Object.entries({x,y,width:w,height:h,fill,rx}).forEach(([k,v])=>el.setAttribute(k,v)); if(stroke){el.setAttribute('stroke',stroke);el.setAttribute('stroke-width',sw);} svg.appendChild(el); return el; }
function poly(svg,pts,fill,stroke=null,sw=0){ const el=document.createElementNS('http://www.w3.org/2000/svg','polygon'); el.setAttribute('points',pts.map(p=>p.join(',')).join(' ')); el.setAttribute('fill',fill); if(stroke){el.setAttribute('stroke',stroke);el.setAttribute('stroke-width',sw);} svg.appendChild(el); return el; }

function path(svg,d,fill,stroke=null,sw=0){ const el=document.createElementNS('http://www.w3.org/2000/svg','path'); el.setAttribute('d',d); el.setAttribute('fill',fill); if(stroke){el.setAttribute('stroke',stroke);el.setAttribute('stroke-width',sw);} svg.appendChild(el); return el; }

function makeCardElement(cardId, mini=false){
  const def = CARD_DEFS.find(c=>c.id===cardId);
  const el = document.createElement('div');
  el.className = 'card' + (mini ? ' mini':'');
  el.dataset.card = cardId;
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 84 84');
  def.draw(svg);
  el.appendChild(svg);
  el.title = def.name;
  return el;
}

function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [a[i],a[j]]=[a[j],a[i]]; } return a; }
function bitCount(n){ let c=0; while(n){ n&=(n-1); c++; } return c; }
function maskHas(mask,idx){ return (mask & (1<<idx))!==0; }
function firstBit(mask){ for(let i=0;i<16;i++) if(mask&(1<<i)) return i; return -1; }
function bits(mask){ const out=[]; for(let i=0;i<16;i++) if(mask&(1<<i)) out.push(i); return out; }

function generateSolution(){ return shuffle(CARD_DEFS.map(c=>c.id)); }
function posOf(solution, cardId){ return solution.indexOf(cardId); }
function rowOf(solution, cardId){ return Math.floor(posOf(solution, cardId)/4); }
function colOf(solution, cardId){ return posOf(solution, cardId)%4; }

function allCandidateClues(solution){
  const ids = CARD_DEFS.map(c=>c.id);
  const clues=[];
  for(const a of ids){
    clues.push({type:'specificRow', axis:'row', a, row:rowOf(solution,a)});
    clues.push({type:'specificCol', axis:'col', a, col:colOf(solution,a)});
  }
  for(const a of ids){
    for(const b of ids){
      if(a===b) continue;
      const pa=posOf(solution,a), pb=posOf(solution,b);
      const A=POSITIONS[pa], B=POSITIONS[pb];
      if(A.row===B.row && B.col===A.col+1) clues.push({type:'adjacentOrdered', axis:'row', a,b});
      if(A.col===B.col && B.row===A.row+1) clues.push({type:'adjacentOrdered', axis:'col', a,b});
      if(A.row===B.row && B.col===A.col+2) clues.push({type:'distance2Ordered', axis:'row', a,b});
      if(A.col===B.col && B.row===A.row+2) clues.push({type:'distance2Ordered', axis:'col', a,b});
      if(A.row===B.row && A.col===0 && B.col===3) clues.push({type:'oppositeEdges', axis:'row', a,b});
      if(A.col===B.col && A.row===0 && B.row===3) clues.push({type:'oppositeEdges', axis:'col', a,b});
    }
  }
  for(const b of ids){
    for(const a of ids){
      if(a===b) continue;
      for(const c of ids){
        if(a===b || b===c || a===c) continue;
        const A=POSITIONS[posOf(solution,a)], B=POSITIONS[posOf(solution,b)], C=POSITIONS[posOf(solution,c)];
        if(A.row===B.row && B.row===C.row){
          const cols=[A.col,B.col,C.col].sort((x,y)=>x-y);
          if(cols[0]+1===cols[1] && cols[1]+1===cols[2] && B.col===cols[1] && a < c) clues.push({type:'between', axis:'row', a,b,c});
        }
        if(A.col===B.col && B.col===C.col){
          const rows=[A.row,B.row,C.row].sort((x,y)=>x-y);
          if(rows[0]+1===rows[1] && rows[1]+1===rows[2] && B.row===rows[1] && a < c) clues.push({type:'between', axis:'col', a,b,c});
        }
      }
    }
  }
  return dedupeClues(clues);
}

function clueKey(clue){
  return JSON.stringify(clue);
}
function dedupeClues(clues){
  const seen=new Set(), out=[];
  for(const c of clues){ const k=clueKey(c); if(!seen.has(k)){seen.add(k); out.push(c);} }
  return out;
}

function domainsFromUnary(clues){
  const dom={};
  for(const c of CARD_DEFS) dom[c.id]=ALL_POS_MASK;
  for(const clue of clues){
    if(clue.type==='specificRow'){
      let mask=0; for(const p of POSITIONS) if(p.row===clue.row) mask|=(1<<p.idx); dom[clue.a] &= mask;
    }
    if(clue.type==='specificCol'){
      let mask=0; for(const p of POSITIONS) if(p.col===clue.col) mask|=(1<<p.idx); dom[clue.a] &= mask;
    }
  }
  return dom;
}

function compatible(clue, pa, pb, pc){
  const A=POSITIONS[pa], B=pb!=null?POSITIONS[pb]:null, C=pc!=null?POSITIONS[pc]:null;
  switch(clue.type){
    case 'adjacentOrdered':
      return clue.axis==='row' ? (A.row===B.row && B.col===A.col+1) : (A.col===B.col && B.row===A.row+1);
    case 'distance2Ordered':
      return clue.axis==='row' ? (A.row===B.row && B.col===A.col+2) : (A.col===B.col && B.row===A.row+2);
    case 'oppositeEdges':
      return clue.axis==='row' ? (A.row===B.row && A.col===0 && B.col===3) : (A.col===B.col && A.row===0 && B.row===3);
    case 'between':
      if(clue.axis==='row'){
        return A.row===B.row && B.row===C.row && Math.abs(A.col-B.col)===1 && Math.abs(C.col-B.col)===1 && Math.abs(A.col-C.col)===2;
      }
      return A.col===B.col && B.col===C.col && Math.abs(A.row-B.row)===1 && Math.abs(C.row-B.row)===1 && Math.abs(A.row-C.row)===2;
  }
  return true;
}

function propagate(dom, clues){
  let changed=true;
  while(changed){
    changed=false;
    for(const id of Object.keys(dom)) if(dom[id]===0) return false;
    // all-different singles
    for(const a of Object.keys(dom)){
      if(bitCount(dom[a])===1){
        const bit=dom[a];
        for(const b of Object.keys(dom)) if(a!==b && (dom[b]&bit)){
          const nd=dom[b] & ~bit;
          if(nd!==dom[b]){ dom[b]=nd; changed=true; if(nd===0) return false; }
        }
      }
    }
    // binary and ternary constraints
    for(const clue of clues){
      if(clue.type==='adjacentOrdered' || clue.type==='distance2Ordered' || clue.type==='oppositeEdges'){
        let da=0, db=0;
        for(const pa of bits(dom[clue.a])){
          let ok=false;
          for(const pb of bits(dom[clue.b])) if(pa!==pb && compatible(clue, pa, pb)){ ok=true; db |= (1<<pb); }
          if(ok) da |= (1<<pa);
        }
        if(da!==dom[clue.a]){ dom[clue.a]=da; changed=true; if(da===0) return false; }
        if((db & dom[clue.b])!==dom[clue.b]){ dom[clue.b] &= db; changed=true; if(dom[clue.b]===0) return false; }
      }
      if(clue.type==='between'){
        let da=0, db=0, dc=0;
        const As=bits(dom[clue.a]), Bs=bits(dom[clue.b]), Cs=bits(dom[clue.c]);
        for(const pa of As){
          let oka=false;
          for(const pb of Bs){
            if(pa===pb) continue;
            for(const pc of Cs){
              if(pa===pc || pb===pc) continue;
              if(compatible(clue,pa,pb,pc)) { oka=true; db|=(1<<pb); dc|=(1<<pc); }
            }
          }
          if(oka) da|=(1<<pa);
        }
        if(da!==dom[clue.a]){ dom[clue.a]=da; changed=true; if(da===0) return false; }
        if((db & dom[clue.b])!==dom[clue.b]){ dom[clue.b] &= db; changed=true; if(dom[clue.b]===0) return false; }
        if((dc & dom[clue.c])!==dom[clue.c]){ dom[clue.c] &= dc; changed=true; if(dom[clue.c]===0) return false; }
      }
    }
    // quick row/col capacity pruning
    for(let pos=0; pos<16; pos++){
      let count=0; for(const id of Object.keys(dom)) if(dom[id]&(1<<pos)) count++;
      if(count===0) return false;
    }
  }
  return true;
}

function cloneDom(dom){ const out={}; for(const k of Object.keys(dom)) out[k]=dom[k]; return out; }

function countSolutions(clues, limit=2, fixedAssignments=null){
  const dom = domainsFromUnary(clues);

  if(fixedAssignments){
    for(const [id, pos] of Object.entries(fixedAssignments)){
      if(!(id in dom)) continue;
      dom[id] &= (1 << pos);
      if(dom[id] === 0) return {count:0, solution:null};
    }
  }

  if(!propagate(dom, clues)) return {count:0, solution:null};
  let solutions=0, first=null;
  function rec(dom){
    if(solutions>=limit) return;
    let chosen=null, size=99;
    for(const id of Object.keys(dom)){
      const bc=bitCount(dom[id]);
      if(bc>1 && bc<size){ size=bc; chosen=id; }
    }
    if(!chosen){
      const used=new Set();
      const solution=Array(16).fill(null);
      for(const id of Object.keys(dom)){
        const pos=firstBit(dom[id]);
        if(used.has(pos)) return;
        used.add(pos); solution[pos]=id;
      }
      if(solution.some(v=>!v)) return;
      solutions++; if(!first) first=solution; return;
    }
    for(const pos of bits(dom[chosen])){
      const d2=cloneDom(dom);
      d2[chosen]=(1<<pos);
      if(propagate(d2, clues)) rec(d2);
      if(solutions>=limit) return;
    }
  }
  rec(dom);
  return {count:solutions, solution:first};
}

function minimizeClues(baseClues, fixedAssignments=null){
  let minimal = [...baseClues];
  let changed = true;

  while(changed){
    changed = false;

    for(let i = minimal.length - 1; i >= 0; i--){
      const test = minimal.slice(0, i).concat(minimal.slice(i + 1));

      // 🔒 pidä vähintään 4 row ja 4 col
      const rowCount = test.filter(c => c.axis === 'row').length;
      const colCount = test.filter(c => c.axis === 'col').length;

      if(rowCount < 4 || colCount < 4) continue;

      if(countSolutions(test, 2, fixedAssignments).count === 1){
        minimal = test;
        changed = true;
        break;
      }
    }
  }

  return minimal;
}

function buildPuzzle(difficulty){
  const maxAttempts = 20;

  for(let attempt=0; attempt<maxAttempts; attempt++){
    const solution = generateSolution();
    const all = allCandidateClues(solution);

    const unary = shuffle(all.filter(c => c.type === 'specificRow' || c.type === 'specificCol'));
    const relational = shuffle(all.filter(c => c.type !== 'specificRow' && c.type !== 'specificCol'));

    const sampledUnary = unary.slice(0, 8);
    const sampledRelational = relational.slice(0, 36);

    const ranked = shuffle([...sampledUnary, ...sampledRelational])
      .sort((x, y) => clueWeight(y) - clueWeight(x));

    const fixedAssignments = difficulty === 'plus2bird'
      ? { birdRed: solution.indexOf('birdRed') }
      : null;

    const chosen = [];
    let solved = null;

    for(const clue of ranked){
      chosen.push(clue);
      const res = countSolutions(chosen, 2, fixedAssignments);
      if(res.count === 1){
        solved = res;
        break;
      }
    }

    if(!solved) continue;

    const minimal = minimizeClues(chosen, fixedAssignments);
    let finalClues = [...minimal];

    if(difficulty === 'plus2bird'){
      const extras = ranked.filter(c => !finalClues.some(m => clueKey(m) === clueKey(c)));
      for(const extra of extras){
        const test = dedupeClues([...finalClues, extra]);
        if(countSolutions(test, 2, fixedAssignments).count === 1){
          finalClues = test;
        }
        if(finalClues.length >= minimal.length + 2) break;
      }
    }

    return {
      solution,
      clues: finalClues,
      minimalCount: minimal.length
    };
  }

  return null;
}

function clueWeight(c){
  return ({between:2, oppositeEdges:2, distance2Ordered:2, adjacentOrdered:2, specificRow:2, specificCol:2}[c.type]||1);
}

function renderBoard(){
  const board = document.getElementById('board'); board.innerHTML='';
  for(let i=0;i<16;i++){
    const slot = document.createElement('div');
    slot.className='slot'+(boardState[i]?' filled':'')+(fixedPositions.has(i)?' fixed':'');
    slot.dataset.pos=i;
    slot.onclick=()=>onSlotClick(i);
    if(boardState[i]) slot.appendChild(makeCardElement(boardState[i]));
    board.appendChild(slot);
  }
}

function updateRelatedClueHighlights(){
  document.querySelectorAll('.clue').forEach(clueEl => {
    const cardIds = (clueEl.dataset.cards || '').split(',').filter(Boolean);
    clueEl.classList.toggle('related', !!selectedCardId && cardIds.includes(selectedCardId));
  });
}

function renderTray(){
  const tray = document.getElementById('tray'); tray.innerHTML='';
  const items = [];
  for(const id of trayOrder){
    const used = boardState.includes(id);
    if(used){
      const ph = document.createElement('div');
      ph.className = 'trayPlaceholder';
      items.push(ph);
      continue;
    }
    const card = makeCardElement(id);
    if(selectedCardId===id) card.classList.add('selected');
    card.onclick=()=>{
      selectedCardId = selectedCardId===id ? null : id;
      renderTray();
      updateRelatedClueHighlights();
    };
    items.push(card);
  }

  items.forEach((el, idx) => {
    el.style.gridRow = '';
    el.style.gridColumn = '';
    tray.appendChild(el);
  });
}

function onSlotClick(pos){
  if(fixedPositions.has(pos)) return;
  if(boardState[pos]){
    boardState[pos]=null;
    renderBoard(); renderTray();
    updateRelatedClueHighlights();
    return;
  }
  if(!selectedCardId) return;
  boardState[pos]=selectedCardId;
  selectedCardId=null;
  renderBoard(); renderTray();
  updateRelatedClueHighlights();
}

function makeMiniGridHighlight(axis, index){
  const grid = document.createElement('div');
  grid.className = 'miniGrid';
  for(let r=0;r<4;r++){
    for(let c=0;c<4;c++){
      const cell = document.createElement('div');
      cell.className = 'cell';
      if((axis==='row' && r===index) || (axis==='col' && c===index)) cell.classList.add('hit');
      grid.appendChild(cell);
    }
  }
  return grid;
}

function clueText(clue){
  const name = id => CARD_DEFS.find(c=>c.id===id).name;
  const axis = clue.axis==='row' ? 'rivillä' : 'sarakkeessa';
  switch(clue.type){
    case 'specificRow': return `${name(clue.a)} on tietyllä vaakarivillä.`;
    case 'specificCol': return `${name(clue.a)} on tietyssä pystysarakkeessa.`;
    case 'adjacentOrdered': return `${name(clue.a)} ja ${name(clue.b)} ovat vierekkäin oikeassa järjestyksessä ${axis}.`;
    case 'distance2Ordered': return `${name(clue.a)} on täsmälleen kahden ruudun päässä ennen korttia ${name(clue.b)} ${axis}.`;
    case 'oppositeEdges': return `${name(clue.a)} ja ${name(clue.b)} ovat vastakkaisilla reunoilla, järjestys tiedetään ${axis}.`;
    case 'between': return `${name(clue.b)} on suoraan korttien ${name(clue.a)} ja ${name(clue.c)} välissä ${axis}, mutta päätyjen järjestys ei ole tiedossa.`;
  }
  return '';
}

function clueCardIds(clue){
  const ids = [];
  if(clue.a) ids.push(clue.a);
  if(clue.b) ids.push(clue.b);
  if(clue.c) ids.push(clue.c);
  return ids;
}

function renderClue(clue){
  const row = document.createElement('div');
  row.className = 'clue ' + (clue.axis==='col' ? 'col':'row');
  row.title = clueText(clue);
  row.dataset.cards = clueCardIds(clue).join(',');
  row.onclick = () => row.classList.toggle('dimmed');
  const icons = document.createElement('div'); icons.className='icons';
  if(clue.type==='specificRow' || clue.type==='specificCol'){
    icons.appendChild(makeCardElement(clue.a, true));
    icons.appendChild(makeMiniGridHighlight(clue.axis, clue.axis==='row' ? clue.row : clue.col));
  } else if(clue.type==='adjacentOrdered'){
    icons.appendChild(makeCardElement(clue.a, true));
    const sym = document.createElement('div'); sym.className='marker'; sym.textContent = clue.axis==='row' ? '⇢' : '⇣';
    icons.appendChild(sym);
    icons.appendChild(makeCardElement(clue.b, true));
  } else if(clue.type==='distance2Ordered'){
    icons.appendChild(makeCardElement(clue.a, true));
    const mid = document.createElement('div'); mid.className='marker'; mid.textContent = clue.axis==='row' ? '□ ⇢' : '□\n⇣'; mid.style.whiteSpace='pre'; mid.style.fontSize='18px';
    icons.appendChild(mid);
    icons.appendChild(makeCardElement(clue.b, true));
  } else if(clue.type==='oppositeEdges'){
    icons.appendChild(makeCardElement(clue.a, true));
    const sym = document.createElement('div'); sym.className='marker'; sym.textContent = clue.axis==='row' ? '⇠  ⇢' : '⇡\n⇣'; sym.style.whiteSpace='pre'; sym.style.fontSize='18px';
    icons.appendChild(sym);
    icons.appendChild(makeCardElement(clue.b, true));
  } else if(clue.type==='between'){
    icons.appendChild(makeCardElement(clue.a, true));
    const s1=document.createElement('div'); s1.className='marker'; s1.textContent = clue.axis==='row' ? '⇄' : '⇅'; icons.appendChild(s1);
    icons.appendChild(makeCardElement(clue.b, true));
    const s2=document.createElement('div'); s2.className='marker'; s2.textContent = clue.axis==='row' ? '⇄' : '⇅'; icons.appendChild(s2);
    icons.appendChild(makeCardElement(clue.c, true));
  }
  row.appendChild(icons);
  return row;
}

function renderClues(clues){
  const rowClues = document.getElementById('rowClues');
  const colClues = document.getElementById('colClues');
  rowClues.innerHTML=''; colClues.innerHTML='';
  const rows = clues.filter(c=>c.axis==='row');
  const cols = clues.filter(c=>c.axis==='col');
  rows.forEach(c=>rowClues.appendChild(renderClue(c)));
  cols.forEach(c=>colClues.appendChild(renderClue(c)));
  updateRelatedClueHighlights();
}

function setStatus(html){ document.getElementById('status').innerHTML = html; }

function newPuzzle(){
  const difficulty = document.getElementById('difficulty').value;
  setStatus('Rakennetaan pulmaa…');

  setTimeout(() => {
    currentPuzzle = buildPuzzle(difficulty);

    if(!currentPuzzle){
      setStatus('<span class="err">Pulman generointi epäonnistui. Kokeile uudelleen.</span>');
      return;
    }

    boardState = Array(16).fill(null);
    trayOrder = shuffle(CARD_DEFS.map(c => c.id));
    selectedCardId = null;
    fixedPositions = new Set();

    if(difficulty === 'plus2bird'){
      const birdPos = currentPuzzle.solution.indexOf('birdRed');
      if(birdPos >= 0){
        boardState[birdPos] = 'birdRed';
        fixedPositions.add(birdPos);
      }
    }

    renderBoard();
    renderTray();
    renderClues(currentPuzzle.clues);

    const difficultyLabel = difficulty === 'minimal'
      ? 'Minimi'
      : 'Punainen lintu';

    setStatus(`Taso: <span class="ok">${difficultyLabel}</span> · 
Vihjeitä: <span class="ok">${currentPuzzle.clues.length}</span>`);
  }, 10);
}

function checkBoard(){
  if(boardState.some(v=>!v)){ setStatus('<span class="err">Ruudukko ei ole vielä täynnä.</span>'); return; }
  const ok = boardState.every((id,i)=>id===currentPuzzle.solution[i]);
  if(ok) setStatus('<span class="ok">Oikein! Ratkaisu on täsmälleen oikein.</span>');
  else setStatus('<span class="err">Ei vielä oikein.</span>');
}

function showSolution(){
  if(!currentPuzzle) return;
  boardState = [...currentPuzzle.solution];
  selectedCardId=null;
  renderBoard(); renderTray();
  updateRelatedClueHighlights();
  setStatus('<span class="ok">Ratkaisu näytetty.</span>');
}

function resetBoard(){
  boardState = Array(16).fill(null);
  selectedCardId = null;

  if(currentPuzzle && document.getElementById('difficulty').value === 'plus2bird'){
    const birdPos = currentPuzzle.solution.indexOf('birdRed');
    if(birdPos >= 0){
      boardState[birdPos] = 'birdRed';
      fixedPositions = new Set([birdPos]);
    } else {
      fixedPositions = new Set();
    }
  } else {
    fixedPositions = new Set();
  }

  renderBoard();
  renderTray();
  updateRelatedClueHighlights();
  setStatus('Ruudukko tyhjennetty.');
}

function init(){
  initRelations();
  renderBoard(); renderTray();
  document.getElementById('newBtn').onclick = newPuzzle;
  document.getElementById('difficulty').onchange = newPuzzle;
  document.getElementById('checkBtn').onclick = checkBoard;
  document.getElementById('showBtn').onclick = showSolution;
  document.getElementById('resetBtn').onclick = resetBoard;
  newPuzzle();
}
init();
</script>
